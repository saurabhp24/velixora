kind = "web"
previewPath = "/"
title = "Velixora"
version = "1.0.0"
id = "artifacts/velixora"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24219

[services.development]
run = "pnpm --filter @workspace/velixora run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/velixora", "run", "build" ]
publicDir = "artifacts/velixora/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24219"
BASE_PATH = "/"
