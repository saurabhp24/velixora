kind = "web"
previewPath = "/"
title = "Velixora – Smart Conversion Universe"
version = "1.0.0"
id = "artifacts/docucraft"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22224

[services.development]
run = "pnpm --filter @workspace/docucraft run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/docucraft", "run", "build" ]
publicDir = "artifacts/docucraft/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22224"
BASE_PATH = "/"
